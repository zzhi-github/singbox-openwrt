name: Build sing-box latest release ipk files

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'sing-box version to build, format: 1.0.0'
        required: false
        default: ''

permissions:
  actions: write
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_generic
    steps:
      - name: Checkout source tree
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget jq llvm \
            python3-pyelftools jq tree libelf-dev

      - name: Generate build keys
        run: |
          sudo apt-get update
          sudo apt-get install -y signify-openbsd
          signify-openbsd -G -n -c 'DO NOT USE - OpenWrt packages feed CI' -p packages_ci.pub -s packages_ci.sec
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "KEY_BUILD<<$EOF" >> $GITHUB_ENV
          cat packages_ci.sec >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Setup latest golang release
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Show go version
        run: |
          go version

      - name: Get latest sing-box version
        run: |
          if [ -z "${{ github.event.inputs.tag }}" ]; then
            TAG=$(curl -s 'https://api.github.com/repos/SagerNet/sing-box/releases/latest' | jq -r '.tag_name' | tr -d 'v')
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "sing-box latest version: $TAG"
          
          if [ -z "$TAG" ]; then
            echo "Error: Could not generate TAG."
            exit 1
          fi                
          echo "TAG=$TAG" >> $GITHUB_ENV    

          NEW_HASH='5e35f2cc0ad14d3beb1956157fe3f4b3a36787dd115f247c72f2d550d353853b'
          
          if [ -z "$NEW_HASH" ]; then
            echo "Error: Could not extract SHA256 hash."
            exit 1
          fi          
          echo "SB_PKG_HASH=$NEW_HASH" >> $GITHUB_ENV
          
      - name: Build
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt.git
          cd openwrt
          ./scripts/feeds update packages
          cp -r feeds/packages/lang/golang /tmp/golang_backup
          
          git fetch --depth 1 origin tag v24.10.4
          git checkout v24.10.4
          cat feeds.conf.default
          ./scripts/feeds update -a
          ## ./scripts/feeds install -a

          echo "Replacing Golang with backed-up version (Go 1.24+)"
          tree feeds/packages/lang/golang
          rm -rf feeds/packages/lang/golang
          tree /tmp/golang_backup
          cp -r /tmp/golang_backup/. feeds/packages/lang/golang/
          rm -rf tmp
          ./scripts/feeds update -i
          ./scripts/feeds install -a

          echo "Showing default go version after replacement"
          grep "VERSION:=" feeds/packages/lang/golang/golang/Makefile
          grep "VERSION:=" feeds/packages/lang/golang/golang-values.mk 

          tree feeds/packages/net/sing-box

          # Convert TAG to OpenWrt-friendly format
          sed -i 's/PKG_VERSION:=.*/PKG_VERSION:=${{ env.TAG }}/g' feeds/packages/net/sing-box/Makefile
          sed -i 's/^PKG_HASH:=.*/PKG_HASH:=${{ env.SB_PKG_HASH }}/g' feeds/packages/net/sing-box/Makefile
          cat feeds/packages/net/sing-box/Makefile
          
          wget https://downloads.openwrt.org/releases/24.10.4/targets/rockchip/armv8/config.buildinfo -O .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          sed -i '/dahdi/d' .config
          make defconfig
          cat .config

          
          # 1. 确保工具链和内核头文件是最新状态
          make toolchain/install
          make target/linux/compile

          # Making Go compiler
          make package/feeds/packages/golang/host/compile V=s
    
          # 3. Double check go compiler
          echo "Go compiler binary..."
          # OpenWrt 可能会把 binary 命名为 go, go1.24, 或 go1.26
          tree ./staging_dir/hostpkg/bin
          ln -sf ../lib/go-1.26/bin/go ./staging_dir/hostpkg/bin/go
          ./staging_dir/hostpkg/bin/go version
          
          # 2. 编译你的 sing-box 包
          make package/feeds/packages/sing-box/compile V=s

          FN=$(find ./bin -name 'sing-box*.ipk' | sort | head -1)
          if [ -z "$FN" ]; then
            echo "No IPK found!" && exit 2
          fi
          FN=$(basename "$FN")
          echo "PKG_NAME=$FN" >> $GITHUB_ENV

          cp bin/packages/aarch64_generic/packages/sing-box*.ipk $GITHUB_WORKSPACE/
          ## cd -
          ## find sdk/bin/packages -maxdepth 10

      - name: Publishing to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}
          path: |
            sing-box*.ipk

      - name: Read release.md and use it as a body of new release
        id: read_release
        shell: bash
        run: |
          r=$(cat README.md)
          r="${r//'%'/'%25'}"
          r="${r//$'\n'/'%0A'}"
          r="${r//$'\r'/'%0D'}"
          echo "RELEASE_BODY=$r" >> $GITHUB_OUTPUT

      - name: Publishing to GitHub Releases
        continue-on-error: true
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: sing-box*.ipk
          tag: ${{ env.TAG }}
          file_glob: true
          overwrite: true
          body: |
            ${{ steps.read_release.outputs.RELEASE_BODY }}
